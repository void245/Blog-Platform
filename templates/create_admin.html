{% extends "layout.html" %}
{% block body %}
  <style>
    /* Admin Setup Page Styling */
    .admin-container {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0085A1 0%, #003d5c 100%);
      padding: 20px;
    }
    
    .admin-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.4s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .admin-card .logo {
      margin-bottom: 30px;
      text-align: center;
    }
    
    .admin-card .logo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #dc3545, #9a202c);
      padding: 8px;
    }
    
    .admin-card h1 {
      font-size: 24px;
      font-weight: 700;
      color: #212529;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .admin-card .subtitle {
      text-align: center;
      color: #6c757d;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .admin-card .warning-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #856404;
    }
    
    .admin-card .form-control {
      width: 100%;
      height: 44px;
      padding: 12px 16px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s ease;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    
    .admin-card .form-control:focus {
      border-color: #0085A1;
      box-shadow: 0 0 0 3px rgba(0, 133, 161, 0.1);
      outline: none;
    }
    
    .admin-card .form-control::placeholder {
      color: #adb5bd;
    }
    
    .admin-card .btn-create {
      width: 100%;
      height: 44px;
      background: linear-gradient(135deg, #dc3545, #c82333);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }
    
    .admin-card .btn-create:hover {
      background: linear-gradient(135deg, #c82333, #a71d2a);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(220, 53, 69, 0.3);
    }
    
    .admin-card .btn-create:active {
      transform: translateY(0);
    }
    
    .admin-card .footer-text {
      text-align: center;
      margin-top: 24px;
      color: #adb5bd;
      font-size: 12px;
    }
    
    @media (max-width: 480px) {
      .admin-card {
        padding: 30px 20px;
      }
      
      .admin-card h1 {
        font-size: 20px;
      }
    }
  </style>
  
  <div class="admin-container">
    <div class="admin-card">
      <div class="logo">
        <img src="https://getbootstrap.com/docs/4.0/assets/brand/bootstrap-solid.svg" alt="Logo">
      </div>
      <h1>Create Admin Account</h1>
      <p class="subtitle">Initial setup - One time only</p>
      
      <div class="warning-box">
        ⚠️ <strong>Important:</strong> After creating the admin account, DELETE the /create-admin route from your code for security.
      </div>
      
      <form method="POST">
        <label for="username" class="sr-only">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Admin Username" required>
        
        <label for="email" class="sr-only">Email address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="Admin Email" required>
        
        <label for="password" class="sr-only">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Strong Password" required>
        
        <button class="btn-create" type="submit">Create Admin User</button>
      </form>
      
      <p class="footer-text">&copy; 2024 Wind Breaker. All rights reserved.</p>
    </div>
  </div>
{% endblock %}
