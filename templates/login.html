{% extends "layout.html" %}

{% block body %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--spacing-6); background: linear-gradient(135deg, var(--color-bg-light) 0%, var(--color-bg-lighter) 100%);">
    <div style="width: 100%; max-width: 450px; animation: fadeInUp 0.6s ease-out;">
        
        <!-- Logo Section -->
        <div style="text-align: center; margin-bottom: var(--spacing-12);">
            <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--color-primary), var(--color-accent)); margin: 0 auto var(--spacing-4); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-lg); animation: float 3s ease-in-out infinite;">
                <i class="fas fa-sign-in-alt" style="font-size: 2rem; color: white;"></i>
            </div>
            <h1 style="margin-bottom: var(--spacing-2);">Welcome Back</h1>
            <p style="color: var(--color-text-secondary);">Sign in to your Wind Breaker account</p>
        </div>

        <!-- Login Form -->
        <form method="POST" style="background: var(--color-bg); border-radius: var(--radius-2xl); padding: var(--spacing-8); box-shadow: var(--shadow-md); border: 1px solid var(--color-border);">
            
            <!-- Email Field -->
            <div class="form-group" style="animation: slideInLeft 0.6s ease-out 0.1s both;">
                <input 
                    type="email" 
                    placeholder=" " 
                    class="form-input" 
                    id="email" 
                    name="email" 
                    required 
                    style="width: 100%;"
                />
                <label class="form-label" for="email">
                    <i class="fas fa-envelope" style="margin-right: var(--spacing-2);"></i>
                    Email Address
                </label>
            </div>

            <!-- Password Field -->
            <div class="form-group" style="animation: slideInLeft 0.6s ease-out 0.2s both;">
                <input 
                    type="password" 
                    placeholder=" " 
                    class="form-input" 
                    id="password" 
                    name="password" 
                    required 
                    style="width: 100%;"
                />
                <label class="form-label" for="password">
                    <i class="fas fa-lock" style="margin-right: var(--spacing-2);"></i>
                    Password
                </label>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-8); animation: slideInLeft 0.6s ease-out 0.3s both;">
                <label style="display: flex; align-items: center; gap: var(--spacing-2); cursor: pointer; font-Size: var(--font-size-sm);">
                    <input type="checkbox" name="remember_me" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--color-primary);" />
                    Remember me
                </label>
                <a href="#" style="color: var(--color-primary); font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); text-decoration: none; transition: color var(--transition-fast);">
                    Forgot password?
                </a>
            </div>

            <!-- Error Messages -->
            {% if error %}
                <div class="toast toast-danger" style="margin-bottom: var(--spacing-6); animation: slideInDown 0.3s ease-out;">
                    <div class="toast-icon">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <div class="toast-content">
                        <div class="toast-message">{{ error }}</div>
                    </div>
                </div>
            {% endif %}

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: var(--spacing-6); animation: slideInLeft 0.6s ease-out 0.4s both;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

            <!-- Divider -->
            <div style="display: flex; align-items: center; gap: var(--spacing-4); margin: var(--spacing-8) 0; color: var(--color-text-tertiary);">
                <div style="flex: 1; height: 1px; background: var(--color-border);"></div>
                <span style="font-size: var(--font-size-sm);">OR</span>
                <div style="flex: 1; height: 1px; background: var(--color-border);"></div>
            </div>

            <!-- Social Login -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-3); margin-bottom: var(--spacing-8);">
                <button type="button" class="btn btn-secondary" onclick="alert('Coming soon!')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button type="button" class="btn btn-secondary" onclick="alert('Coming soon!')">
                    <i class="fab fa-github"></i> GitHub
                </button>
            </div>
        </form>

        <!-- Sign Up Link -->
        <p style="text-align: center; color: var(--color-text-secondary); margin-top: var(--spacing-6);">
            Don't have an account? 
            <a href="{{ url_for('register') }}" style="color: var(--color-primary); font-weight: var(--font-weight-semibold); text-decoration: none;">
                Create account
            </a>
        </p>

        <!-- Terms -->
        <p style="text-align: center; font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-top: var(--spacing-6);">
            By signing in, you agree to our 
            <a href="#" style="color: var(--color-primary); text-decoration: none;">Terms</a> and 
            <a href="#" style="color: var(--color-primary); text-decoration: none;">Privacy Policy</a>
        </p>
    </div>
</div>

<style>
    /* Floating label animations */
    @keyframes floatLabel {
        from {
            transform: scale(0.75) translateY(-1.7rem);
            color: var(--color-text-tertiary);
        }
        to {
            transform: scale(1) translateY(0);
            color: var(--color-text);
        }
    }

    .form-input:focus ~ .form-label,
    .form-input:not(:placeholder-shown) ~ .form-label {
        transform: scale(0.75) translateY(-1.7rem);
        color: var(--color-primary);
    }
</style>
{% endblock %}
